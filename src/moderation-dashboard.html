<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Moderation Dashboard</h1>
        </header>
        <main>
            <section id="filters">
                <h2>Filter Reviews</h2>
                <form id="filter-form">
                    <label for="filter-search">Search:</label>
                    <input type="text" id="filter-search" placeholder="Search reviews...">
                    <label for="filter-status">Status:</label>
                    <select id="filter-status">
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <button type="submit">Apply Filters</button>
                </form>
            </section>
            <section id="review-list">
                <h2>Customer Reviews</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer Name</th>
                            <th>Review</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Reviews will be dynamically injected here -->
                    </tbody>
                </table>
            </section>
            <section id="export-section">
                <h2>Export</h2>
                <button id="export-button">Export Reviews</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2023 Qowaa Fit Reviews</p>
        </footer>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
